<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatLab - Statistical Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/danfojs@1.1.2/lib/bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstat@1.9.6/dist/jstat.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>StatLab</h1>
      <p>Statistical Analysis</p>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="variable-list" id="variable-list">
      <h3>Variables</h3>
      <p class="text-muted" style="font-size: 0.75rem;">Upload data to see variables</p>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <div class="spinner"></div>
  </main>

  <script src="js/state.js"></script>
  <script src="js/utils/stats.js"></script>
  <script src="js/utils/charts.js"></script>
  <script src="js/controllers/data.js"></script>
  <script src="js/controllers/descriptives.js"></script>
  <script src="js/controllers/frequencies.js"></script>
  <script src="js/controllers/ttest.js"></script>
  <script src="js/controllers/anova.js"></script>
  <script src="js/controllers/correlation.js"></script>
  <script src="js/controllers/chisquare.js"></script>
  <script src="js/controllers/regression.js"></script>
  <script src="js/controllers/export.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('mobile-menu-btn').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });

    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('mobile-menu-btn');
      if (!sidebar.contains(e.target) && !btn.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });
  </script>
</body>
</html>
